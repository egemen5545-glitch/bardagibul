workflows:
  ios_testflight:
    name: Top Bulmaca iOS - TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Codemagic > Team settings > Integrations > Developer Portal kısmında
    # eklediğin App Store Connect API key adını buraya yaz.
    integrations:
      app_store_connect: codemagic

    environment:
      xcode: latest
      node: 20
      cocoapods: default

      # BUNDLE_ID: App Store Connect ve Apple Developer'da açtığın Bundle ID ile birebir aynı olmalı.
      # APP_STORE_APP_ID: App Store Connect > App Information kısmındaki Apple ID.
      vars:
        APP_NAME: "Top Bulmaca"
        BUNDLE_ID: "com.egemen5545.topbulmaca"
        APP_STORE_APP_ID: "BURAYA_APPLE_APP_ID_YAZ"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.egemen5545.topbulmaca"

    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install JavaScript dependencies
        script: |
          npm ci || npm install

      - name: Prepare Capacitor iOS project
        script: |
          if ! npm list @capacitor/ios >/dev/null 2>&1; then
            npm install @capacitor/ios --save
          fi

          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set iOS app name and version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist || true

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
